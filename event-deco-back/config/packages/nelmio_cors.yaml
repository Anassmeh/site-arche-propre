nelmio_cors:
  defaults:
    allow_origin: ['http://localhost:8081']
    allow_methods: ['GET', POST, PUT, PATCH, DELETE, OPTIONS]
    allow_headers: ['Content-Type', 'Authorization']
    expose_headers: ['Link']
    max_age: 3600

  paths:
    '^/api/':
      allow_origin: ['http://localhost:8081']
      allow_methods: ['GET', POST, PUT, PATCH, DELETE, OPTIONS]
      allow_headers: ['Content-Type', Authorization]
      max_age: 3600